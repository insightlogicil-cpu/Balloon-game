<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>משחק הבלונים — נסיכת השטוזים 🎈</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Varela+Round&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{--pink:#FF6EB4;--lilac:#C97FE8;--mint:#5DDCB0;--yellow:#FFD93D;--peach:#FF9A6C;--sky:#74D7F7;--bg:#FFF0F8;}
  body{font-family:"Varela Round",sans-serif;background:var(--bg);min-height:100dvh;overflow:hidden;display:flex;flex-direction:column;align-items:center;user-select:none;-webkit-user-select:none;touch-action:manipulation;}
  .screen{display:none;width:100%;max-width:480px;min-height:100dvh;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:14px;}
  .screen.active{display:flex;}

  /* WELCOME */
  #welcome{background:linear-gradient(160deg,#FFD6F0 0%,#E8C8FF 50%,#C8E8FF 100%);}
  .logo-img{width:min(160px,42vw);height:min(160px,42vw);border-radius:50%;border:4px solid white;box-shadow:0 0 0 4px var(--pink),0 0 0 8px rgba(201,127,232,0.35);object-fit:cover;}
  .game-title{font-family:"Fredoka One",cursive;font-size:clamp(22px,7vw,34px);color:#9B2FAB;text-align:center;text-shadow:2px 2px 0 #FFD6F0;line-height:1.2;}
  .game-sub{font-size:clamp(13px,4vw,16px);color:#6B2B8A;text-align:center;}

  /* MODE */
  #modeSelect{background:linear-gradient(160deg,#FFD6F0,#E8C8FF,#C8E8FF);gap:12px;}
  .sec-title{font-family:"Fredoka One",cursive;font-size:clamp(18px,5vw,26px);color:#9B2FAB;text-align:center;}
  .mode-card{width:100%;max-width:320px;background:white;border-radius:20px;padding:14px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 16px rgba(199,127,232,0.25);cursor:pointer;border:3px solid transparent;transition:transform 0.12s;}
  .mode-card:active{transform:scale(0.96);}
  .m-balloon{border-color:var(--sky);}
  .m-logo{border-color:var(--pink);}
  .m-hearts{border-color:#FF4444;}
  .mode-emoji{font-size:32px;}
  .mode-name{font-family:"Fredoka One",cursive;font-size:18px;color:#6B2B8A;}
  .mode-desc{font-size:12px;color:#aaa;margin-top:2px;}

  /* SETUP */
  #setupSelect{background:linear-gradient(160deg,#FFD6F0,#E8C8FF,#C8E8FF);gap:12px;}
  .chip-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .chip{padding:10px 20px;border-radius:16px;border:none;font-family:"Fredoka One",cursive;font-size:16px;cursor:pointer;transition:transform 0.1s;background:#E8C8FF;color:#6B2B8A;}
  .chip:active{transform:scale(0.92);}
  .chip.sel{background:#9B2FAB;color:white;box-shadow:0 0 0 3px white;}
  .d1{background:#A8E6CF;color:#1a5c3a;} .d1.sel{background:#1a5c3a;color:white;}
  .d2{background:#FFD93D;color:#5c3a00;} .d2.sel{background:#b8860b;color:white;}
  .d3{background:#FF9A6C;color:#7A2000;} .d3.sel{background:#c0392b;color:white;}

  /* GAME */
  #game{background:linear-gradient(180deg,#B8E0FF 0%,#FFD6F0 100%);padding:0;overflow:hidden;position:relative;flex-direction:column;justify-content:flex-start;}
  .top-bar{width:100%;display:flex;align-items:center;gap:6px;padding:8px 12px;background:rgba(255,255,255,0.65);backdrop-filter:blur(4px);z-index:10;flex-shrink:0;}
  .score-box{background:var(--pink);color:white;border-radius:12px;padding:4px 10px;font-family:"Fredoka One",cursive;font-size:15px;flex-shrink:0;}
  .progress-box{flex:1;text-align:center;font-family:"Fredoka One",cursive;font-size:16px;color:#9B2FAB;}
  .lives-box{flex-shrink:0;font-size:17px;}
  .target-bar{width:100%;text-align:center;padding:5px 12px 7px;font-family:"Fredoka One",cursive;font-size:clamp(14px,4vw,18px);color:#9B2FAB;background:rgba(255,255,255,0.5);flex-shrink:0;z-index:10;}

  /* PROGRESS BAR */
  .prog-wrap{width:100%;padding:4px 12px 6px;background:rgba(255,255,255,0.4);flex-shrink:0;}
  .prog-track{width:100%;height:12px;background:rgba(255,255,255,0.6);border-radius:8px;overflow:hidden;}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--lilac));border-radius:8px;transition:width 0.3s ease;width:0%;}

  /* ARENA */
  #arena{flex:1;position:relative;width:100%;overflow:hidden;}

  /* BALLOON */
  .balloon{position:absolute;z-index:5;}
  .balloon svg{width:52px;height:70px;display:block;}

  /* PADDLE */
  #paddle{position:absolute;bottom:0;height:14px;width:58px;background:linear-gradient(90deg,var(--pink),var(--lilac));border-radius:8px;box-shadow:0 0 10px rgba(199,127,232,0.7),0 2px 6px rgba(0,0,0,0.15);z-index:8;transition:none;}
  #paddle::after{content:"";position:absolute;top:3px;left:8px;right:8px;height:4px;background:rgba(255,255,255,0.5);border-radius:4px;}

  /* CONTROLS */
  .ctrl-wrap{width:100%;display:flex;justify-content:space-between;align-items:center;padding:8px 14px 10px;background:rgba(255,255,255,0.45);flex-shrink:0;z-index:10;}
  .ctrl-btn{width:72px;height:52px;border-radius:16px;border:none;background:var(--lilac);color:white;font-size:26px;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,0.12);transition:transform 0.08s;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
  .ctrl-btn:active{transform:scale(0.88);background:#9B2FAB;}
  .ctrl-mid{font-family:"Fredoka One",cursive;font-size:12px;color:#9B2FAB;text-align:center;}

  /* TAP ZONES */
  #tapL,#tapR{position:absolute;top:0;bottom:0;width:28%;z-index:3;-webkit-tap-highlight-color:transparent;}
  #tapL{left:0;} #tapR{right:0;}

  /* FIXED BTNS */
  .fx{position:fixed;left:10px;z-index:30;background:rgba(255,255,255,0.85);border:none;border-radius:50%;width:38px;height:38px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.12);}
  #btnSnd{top:10px;} #btnVox{top:52px;} #btnPau{top:94px;display:none;}

  /* PAUSE */
  #pauseOv{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:50;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
  #pauseOv.show{display:flex;}
  .pau-btn{width:190px;padding:13px;border-radius:18px;border:none;font-family:"Fredoka One",cursive;font-size:19px;cursor:pointer;}
  .p-go{background:var(--mint);color:#1a5c3a;} .p-rst{background:var(--yellow);color:#5c3a00;} .p-home{background:var(--pink);color:white;}

  /* WIN */
  #win{background:linear-gradient(160deg,#FFD6F0,#E8C8FF,#C8E8FF);gap:14px;position:relative;}
  #confCvs{position:fixed;inset:0;pointer-events:none;z-index:60;}
  .win-title{font-family:"Fredoka One",cursive;font-size:clamp(26px,8vw,42px);color:#9B2FAB;text-align:center;}
  .win-score{font-family:"Fredoka One",cursive;font-size:clamp(18px,5vw,26px);color:#FF6EB4;text-align:center;}
  .win-msg{font-family:"Fredoka One",cursive;font-size:clamp(15px,4vw,20px);color:#6B2B8A;text-align:center;}

  /* BUTTONS */
  .big-btn{padding:13px 28px;border-radius:20px;border:none;font-family:"Fredoka One",cursive;font-size:clamp(15px,5vw,20px);cursor:pointer;transition:transform 0.1s;box-shadow:0 4px 14px rgba(0,0,0,0.1);}
  .big-btn:active{transform:scale(0.93);}
  .btn-play{background:linear-gradient(135deg,var(--pink),var(--lilac));color:white;}
  .btn-again{background:linear-gradient(135deg,var(--mint),var(--sky));color:#1a5c3a;}
  .btn-home{background:rgba(255,255,255,0.85);color:#9B2FAB;}
  .back-btn{background:none;border:none;font-size:22px;cursor:pointer;position:absolute;top:14px;right:14px;}

  /* EFFECTS */
  .pop-p{position:fixed;pointer-events:none;z-index:40;font-size:20px;animation:popfly 0.5s ease-out forwards;}
  @keyframes popfly{0%{transform:scale(0.5);opacity:1;}100%{transform:scale(1.3) translate(var(--tx),var(--ty));opacity:0;}}
  .float-txt{position:fixed;pointer-events:none;z-index:45;font-family:"Fredoka One",cursive;font-size:26px;text-shadow:0 2px 6px rgba(0,0,0,0.2);animation:floatup 0.9s ease-out forwards;}
  @keyframes floatup{0%{transform:translateY(0);opacity:1;}100%{transform:translateY(-60px);opacity:0;}}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
  .shake{animation:shake 0.3s ease;}

  /* KISS FIREWORK */
  .kiss-spark{position:fixed;pointer-events:none;z-index:55;font-size:18px;animation:kissspark var(--dur) ease-out forwards;}
  @keyframes kissspark{
    0%  {transform:translate(0,0) scale(0.4);opacity:1;}
    60% {opacity:1;}
    100%{transform:translate(var(--tx),var(--ty)) scale(1.1);opacity:0;}
  }
  .kiss-flash{position:fixed;pointer-events:none;z-index:54;border-radius:50%;
    background:radial-gradient(circle,rgba(255,180,220,0.9) 0%,rgba(255,100,180,0.5) 40%,transparent 70%);
    animation:kissflash 0.35s ease-out forwards;}
  @keyframes kissflash{0%{transform:scale(0);opacity:1;}60%{opacity:0.8;}100%{transform:scale(3.5);opacity:0;}}
</style>
</head>

/* ── AUDIO ── */
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(freq,type,dur,vol,delay){
  if(!sndOn)return;
  try{var ac=getAC(),o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);o.type=type||"sine";o.frequency.value=freq;
  var t=ac.currentTime+(delay||0);g.gain.setValueAtTime(vol||0.3,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.start(t);o.stop(t+dur);}catch(e){}
}
function playPop(){
  if(!sndOn)return;
  try{var ac=getAC(),sz=ac.sampleRate*0.09,buf=ac.createBuffer(1,sz,ac.sampleRate),d=buf.getChannelData(0);
  for(var i=0;i<sz;i++)d[i]=(Math.random()*2-1);
  var s=ac.createBufferSource(),f=ac.createBiquadFilter(),g=ac.createGain();
  f.type="bandpass";f.frequency.value=900;f.Q.value=0.7;
  g.gain.setValueAtTime(1.0,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1);
  s.buffer=buf;s.connect(f);f.connect(g);g.connect(ac.destination);s.start();s.stop(ac.currentTime+0.1);
  tone(500,"sine",0.04,0.5,0);tone(180,"sine",0.07,0.3,0.04);}catch(e){}
}
function playWin(){[523,659,784,1047,1318].forEach(function(f,i){tone(f,"sine",0.18,0.35,i*0.11);});}
function playMiss(){tone(220,"triangle",0.12,0.2);}
function playKiss(){
  // Sparkly kiss sound: rising tones + shimmer
  [600,800,1000,1300,1600].forEach(function(f,i){tone(f,"sine",0.08,0.35,i*0.055);});
  [1200,900,1500].forEach(function(f,i){tone(f,"triangle",0.06,0.2,0.05+i*0.07);});
}
function playHeart(){tone(700,"sine",0.1,0.35);tone(1000,"sine",0.08,0.25,0.11);}

/* ── SPEECH ── */
function loadV(){voices=window.speechSynthesis.getVoices();prefVoice=voices.find(function(v){return /en/i.test(v.lang)&&/female|samantha|karen|victoria/i.test(v.name);})||voices.find(function(v){return /en-US/i.test(v.lang);})||voices[0];}
window.speechSynthesis.onvoiceschanged=loadV;loadV();
function speak(t,r,p){if(!voxOn)return;window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang="en-US";u.rate=r||0.78;u.pitch=p||1.55;if(prefVoice)u.voice=prefVoice;window.speechSynthesis.speak(u);}
function toggleSnd(){sndOn=!sndOn;document.getElementById("btnSnd").textContent=sndOn?"🔊":"🔇";}
function toggleVox(){voxOn=!voxOn;document.getElementById("btnVox").textContent=voxOn?"🗣️":"🤫";}

/* ── SCREENS ── */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});
  document.getElementById(id).classList.add("active");
  document.getElementById("btnPau").style.display=(id==="game")?"flex":"none";
}
function goHome(){clearAll();paused=false;document.getElementById("pauseOv").classList.remove("show");showScreen("modeSelect");}

/* ── SETUP ── */
function selectMode(m){mode=m;showScreen("setupSelect");}
function selDiff(d){
  diff=d;
  document.querySelectorAll(".chip.d1,.chip.d2,.chip.d3").forEach(function(b){b.classList.remove("sel");});
  document.getElementById("db"+d).classList.add("sel");
}
function selGoal(g){
  goalPops=g;
  ["gb1","gb2","gb3"].forEach(function(id){document.getElementById(id).classList.remove("sel");});
  var map={20:"gb1",50:"gb2",100:"gb3"};
  if(map[g])document.getElementById(map[g]).classList.add("sel");
}

/* ── START ── */
function startGame(){
  clearAll();
  score=0;lives=3;pops=0;gameOver=false;paused=false;
  showScreen("game");
  updateHUD();
  setTimeout(function(){
    var arena=document.getElementById("arena");
    arenaW=arena.offsetWidth;
    arenaH=arena.offsetHeight;
    // Safety: if still 0, use window size minus chrome
    if(arenaH<100) arenaH=window.innerHeight-200;
    if(arenaW<100) arenaW=window.innerWidth;
    document.getElementById("goalD").textContent=goalPops;
    paddleX=(arenaW-paddleW)/2;
    var pad=document.getElementById("paddle");
    pad.style.width=paddleW+"px";
    pad.style.left=paddleX+"px";
    if(mode==="balloon"){pickColor();setTargetBar();speak("Pop the "+currentColor.speak+" balloon!");}
    else if(mode==="logo"){setTargetBar();speak("Catch the princess!");}
    else{setTargetBar();speak("Catch the hearts!");}
    startSpawner();
    startMoveLoop();
  },150);
}
function restartSame(){document.getElementById("pauseOv").classList.remove("show");startGame();}

/* ── COLOR ── */
function pickColor(){
  var pool=COLORS.slice(0,DIFF[diff].cols).filter(function(c){return c.name!==lastColorName;});
  if(!pool.length)pool=COLORS.slice(0,DIFF[diff].cols);
  currentColor=pool[Math.floor(Math.random()*pool.length)];
  lastColorName=currentColor.name;
}
function setTargetBar(){
  var bar=document.getElementById("targetBar");
  if(mode==="balloon"){
    bar.innerHTML='🎈 Pop the <span style="color:'+currentColor.hex+';font-size:1.3em;font-family:Fredoka One,cursive;text-shadow:0 0 8px '+currentColor.hex+'">'+currentColor.speak.toUpperCase()+'</span> balloon!';
  }else if(mode==="logo"){
    bar.innerHTML="💋 Catch the Princess!";
  }else{
    bar.innerHTML="❤️ Catch the Hearts!";
  }
}

/* ── HUD ── */
function updateHUD(){
  document.getElementById("scoreD").textContent=score;
  document.getElementById("popsD").textContent=pops;
  var pct=Math.min(100,Math.round((pops/goalPops)*100));
  document.getElementById("progFill").style.width=pct+"%";
  var h="";for(var i=0;i<lives;i++)h+="❤️";for(var j=lives;j<3;j++)h+="🩶";
  document.getElementById("livesD").textContent=h;
}

/* ── SPAWN ── */
function startSpawner(){
  clearInterval(spawnIv);
  var d=DIFF[diff];
  spawnBalloon();
  spawnIv=setInterval(function(){
    if(paused||gameOver)return;
    if(balloons.length<d.maxB)spawnBalloon();
  },d.spawnMs);
}

function makeSVG(hex){
  var dk="rgb("+((parseInt(hex.slice(1,3),16)*0.6)|0)+","+((parseInt(hex.slice(3,5),16)*0.6)|0)+","+((parseInt(hex.slice(5,7),16)*0.6)|0)+")";
  return'<svg viewBox="0 0 52 70" xmlns="http://www.w3.org/2000/svg">'
    +'<ellipse cx="26" cy="25" rx="20" ry="23" fill="'+hex+'"/>'
    +'<ellipse cx="20" cy="17" rx="6" ry="4" fill="white" opacity="0.38"/>'
    +'<line x1="26" y1="48" x2="26" y2="66" stroke="'+dk+'" stroke-width="1.5"/>'
    +'<circle cx="26" cy="48" r="2.5" fill="'+dk+'"/>'
    +'</svg>';
}

function spawnBalloon(){
  if(gameOver)return;
  var arena=document.getElementById("arena");
  var el=document.createElement("div");
  el.className="balloon";
  var obj={id:Date.now()+Math.random(),removed:false};
  var d=DIFF[diff];

  if(mode==="balloon"){
    var pool=COLORS.slice(0,d.cols);
    var c=(Math.random()<0.45)?currentColor:pool[Math.floor(Math.random()*pool.length)];
    obj.type="balloon";obj.color=c.name;obj.colorHex=c.hex;
    el.innerHTML=makeSVG(c.hex);
  }else if(mode==="logo"){
    var r=Math.random();
    if(r<0.45){obj.type="logo";el.innerHTML='<img src="'+LOGO+'" style="width:60px;height:60px;border-radius:50%;border:3px solid white;box-shadow:0 0 0 3px #FF6EB4;object-fit:cover">';}
    else if(r<0.72){var c2=COLORS[Math.floor(Math.random()*COLORS.length)];obj.type="dist";obj.colorHex=c2.hex;el.innerHTML=makeSVG(c2.hex);}
    else{obj.type="dist";el.innerHTML='<div style="font-size:46px;line-height:1">'+HEARTS[Math.floor(Math.random()*HEARTS.length)]+'</div>';}
  }else{
    if(Math.random()<0.55){obj.type="heart";el.innerHTML='<div style="font-size:46px;line-height:1">'+HEARTS[Math.floor(Math.random()*HEARTS.length)]+'</div>';}
    else{var c3=COLORS[Math.floor(Math.random()*COLORS.length)];obj.type="dist";obj.colorHex=c3.hex;el.innerHTML=makeSVG(c3.hex);}
  }

  obj.x=Math.floor(Math.random()*Math.max(10,arenaW-64));
  obj.y=-75;
  obj.speed=d.speed*(0.85+Math.random()*0.3);
  obj.el=el;
  el.style.left=obj.x+"px";
  el.style.top=obj.y+"px";
  arena.appendChild(el);
  balloons.push(obj);
  animB(obj);
}

/* ── ANIMATE + COLLISION ── */
function animB(obj){
  if(obj.removed)return;
  if(paused){requestAnimationFrame(function(){animB(obj);});return;}
  obj.y+=obj.speed;
  obj.el.style.top=obj.y+"px";
  // Paddle collision: balloon bottom = obj.y+68, paddle top = arenaH-14
  var bBottom=obj.y+68;
  var pTop=arenaH-14;
  var bCX=obj.x+26;
  if(bBottom>=pTop && obj.y<arenaH+5){
    if(bCX>=paddleX && bCX<=paddleX+paddleW){
      onHit(obj);return;
    }
  }
  if(obj.y>arenaH+15){onMiss(obj);return;}
  requestAnimationFrame(function(){animB(obj);});
}

function onHit(obj){
  if(obj.removed)return;
  var rect=obj.el.getBoundingClientRect();
  var cx=rect.left+26,cy=rect.top+35;
  var good=false;
  if(mode==="balloon"&&obj.type==="balloon"&&obj.color===currentColor.name)good=true;
  if(mode==="logo"&&obj.type==="logo")good=true;
  if(mode==="hearts"&&obj.type==="heart")good=true;

  if(good){
    if(mode==="balloon"){burst(cx,cy,obj.colorHex||"#FF6EB4");playPop();}
    else if(mode==="logo"){kissFirework(cx,cy);playKiss();}
    else{burst(cx,cy,"#FF4444");playHeart();}
    score+=10;pops++;
    removeObj(obj);
    updateHUD();
    floatTxt("+10 ⭐",cx,cy,"#22CC44");
    if(mode==="balloon")speak(currentColor.speak+" balloon! Great!",0.85,1.6);
    else if(mode==="logo")speak("Kiss!",0.9,1.7);
    else speak("Love!",0.9,1.7);
    if(pops>=goalPops){endGame();return;}
  }else{
    // distractor — silent remove, no penalty
    removeObj(obj);
  }
}

function onMiss(obj){
  if(obj.removed)return;
  var wasTarget=(mode==="balloon"&&obj.type==="balloon"&&obj.color===currentColor.name)
              ||(mode==="logo"&&obj.type==="logo")
              ||(mode==="hearts"&&obj.type==="heart");
  removeObj(obj);
  if(wasTarget){
    playMiss();
    // Lives are visual feedback only — game never ends from missing
    if(lives>0){ lives--; updateHUD(); }
  }
}

/* ── PADDLE ── */
var SPEED=3;
function startMove(d){moveDir=d;}
function stopMove(){moveDir=0;}
function startMoveLoop(){
  cancelAnimationFrame(moveRaf);
  function loop(){
    if(!gameOver&&!paused&&moveDir!==0){
      paddleX+=moveDir*SPEED;
      paddleX=Math.max(0,Math.min(arenaW-paddleW,paddleX));
      document.getElementById("paddle").style.left=paddleX+"px";
    }
    moveRaf=requestAnimationFrame(loop);
  }
  moveRaf=requestAnimationFrame(loop);
}

/* ── EFFECTS ── */
function burst(cx,cy,color){
  ["💥","✨","🌟","⭐","💫"].forEach(function(e,i){
    var el=document.createElement("div");el.className="pop-p";el.textContent=e;
    var a=Math.random()*Math.PI*2,d=35+Math.random()*35;
    el.style.left=cx+"px";el.style.top=cy+"px";
    el.style.setProperty("--tx",(Math.cos(a)*d)+"px");
    el.style.setProperty("--ty",(Math.sin(a)*d)+"px");
    document.body.appendChild(el);setTimeout(function(){el.remove();},550);
  });
}
function floatTxt(txt,x,y,col){
  var el=document.createElement("div");el.className="float-txt";el.textContent=txt;
  el.style.left=x+"px";el.style.top=y+"px";el.style.color=col||"#9B2FAB";
  document.body.appendChild(el);setTimeout(function(){el.remove();},950);
}

/* ── PAUSE ── */
function togglePause(){
  if(gameOver)return;
  paused=!paused;
  document.getElementById("pauseOv").classList.toggle("show",paused);
  document.getElementById("btnPau").textContent=paused?"▶️":"⏸";
  if(!paused)speak("Let us go!",0.9);
}

/* ── KISS FIREWORK ── */
function kissFirework(cx,cy){
  // Flash
  var fl=document.createElement("div");
  fl.className="kiss-flash";
  fl.style.width="80px";fl.style.height="80px";
  fl.style.left=(cx-40)+"px";fl.style.top=(cy-40)+"px";
  document.body.appendChild(fl);
  setTimeout(function(){fl.remove();},400);

  // Sparks — hearts & kisses flying outward
  var emojis=["💋","💕","💗","✨","💖","🌸","💫","❤️","💝","⭐"];
  var count=14;
  for(var i=0;i<count;i++){
    (function(idx){
      var el=document.createElement("div");
      el.className="kiss-spark";
      var angle=(idx/count)*Math.PI*2;
      var dist=55+Math.random()*65;
      var dur=(0.45+Math.random()*0.35).toFixed(2);
      el.style.setProperty("--tx",(Math.cos(angle)*dist)+"px");
      el.style.setProperty("--ty",(Math.sin(angle)*dist)+"px");
      el.style.setProperty("--dur",dur+"s");
      el.style.left=cx+"px";el.style.top=cy+"px";
      el.textContent=emojis[idx%emojis.length];
      document.body.appendChild(el);
      setTimeout(function(){el.remove();},(parseFloat(dur)*1000)+50);
    })(i);
  }

  // Second wave after 180ms
  setTimeout(function(){
    var emojis2=["💋","🌟","💞","✨","💘"];
    for(var i=0;i<7;i++){
      (function(idx){
        var el=document.createElement("div");
        el.className="kiss-spark";
        var angle=(idx/7)*Math.PI*2+(Math.PI/7);
        var dist=35+Math.random()*50;
        var dur=(0.35+Math.random()*0.25).toFixed(2);
        el.style.setProperty("--tx",(Math.cos(angle)*dist)+"px");
        el.style.setProperty("--ty",(Math.sin(angle)*dist)+"px");
        el.style.setProperty("--dur",dur+"s");
        el.style.left=cx+"px";el.style.top=cy+"px";
        el.style.fontSize="14px";
        el.textContent=emojis2[idx%emojis2.length];
        document.body.appendChild(el);
        setTimeout(function(){el.remove();},(parseFloat(dur)*1000)+50);
      })(i);
    }
  },180);
}

/* ── END ── */
function endGame(){
  gameOver=true;clearAll();
  document.getElementById("pauseOv").classList.remove("show");
  var title,msg,spoken;
  if(pops>=goalPops){
    title="🎉 הגעת ליעד! 🎉";
    msg=score>=200?"👑 את אלופה מדהימה!":"🌟 כל הכבוד לנסיכה!";
    spoken="Amazing! You reached the goal!";
  }else if(score===0){
    title="💪 בפעם הבאה!";msg="תנסי שוב, את יכולה!";spoken="Try again! You can do it!";
  }else if(score<100){
    title="🎈 כמעט!";msg="יופי של ניסיון, תמשיכי!";spoken="Good try! Keep going!";
  }else{
    title="⭐ יפה מאוד!";msg="את על הדרך הנכונה!";spoken="Very nice! Well done!";
  }
  document.getElementById("winTitle").textContent=title;
  document.getElementById("winScore").textContent="🎈 "+pops+" פיצוצים | ⭐ "+score+" נקודות";
  document.getElementById("winMsg").textContent=msg;
  playWin();speak(spoken);
  showScreen("win");
  if(pops>0)startConfetti();
}

/* ── CLEANUP ── */
function clearAll(){
  clearInterval(spawnIv);cancelAnimationFrame(moveRaf);moveDir=0;
  balloons.forEach(function(o){o.removed=true;if(o.el&&o.el.parentNode)o.el.parentNode.removeChild(o.el);});
  balloons=[];
}
function removeObj(obj){
  if(obj.removed)return;obj.removed=true;
  if(obj.el&&obj.el.parentNode)obj.el.parentNode.removeChild(obj.el);
  balloons=balloons.filter(function(o){return o.id!==obj.id;});
}

/* ── CONFETTI ── */
function startConfetti(){
  var cv=document.getElementById("confCvs"),ctx=cv.getContext("2d");
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  var cols=["#FF6EB4","#C97FE8","#FFD93D","#5DDCB0","#FF9A6C","#74D7F7"];
  var pp=Array.from({length:80},function(){return{x:Math.random()*cv.width,y:Math.random()*-cv.height,w:Math.random()*10+5,h:Math.random()*5+3,c:cols[Math.floor(Math.random()*cols.length)],s:Math.random()*3+2,a:Math.random()*360,sp:Math.random()*6-3};});
  var af;function draw(){ctx.clearRect(0,0,cv.width,cv.height);pp.forEach(function(p){p.y+=p.s;p.a+=p.sp;if(p.y>cv.height){p.y=-20;p.x=Math.random()*cv.width;}ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a*Math.PI/180);ctx.fillStyle=p.c;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});af=requestAnimationFrame(draw);}
  draw();setTimeout(function(){cancelAnimationFrame(af);ctx.clearRect(0,0,cv.width,cv.height);},6000);
}

/* ── KEYBOARD ── */
document.addEventListener("keydown",function(e){if(e.key==="ArrowLeft")startMove(-1);if(e.key==="ArrowRight")startMove(1);if(e.key===" ")togglePause();});
document.addEventListener("keyup",function(e){if(e.key==="ArrowLeft"||e.key==="ArrowRight")stopMove();});
</script>
